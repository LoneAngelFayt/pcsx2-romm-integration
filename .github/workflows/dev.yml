name: Dev Build

on:
  push:
    branches-ignore:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase repo owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :dev tag
        uses: docker/build-push-action@v5
        with:
          context: .
          provenance: false
          outputs: type=registry,compression=gzip,force-compression=true
          tags: ghcr.io/${{ steps.owner.outputs.name }}/pcsx2-romm-integration-mod:dev
